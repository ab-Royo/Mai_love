[plugin]
enabled = true
config_version = "2.0.0"
llm_model = "planner"

[whitelist]
# 多用户模式：目标 QQ 号列表（推荐）
target_qqs = [123456789]
# 旧字段（已弃用）：单用户目标 QQ。若与 target_qqs 同时设置，会自动合并去重
# target_qq = 123456789

[schedule]
generate_hour = 3
check_interval_minutes = 10
daily_max_speak = 5
user_cooldown_minutes = 30
proactive_trigger_enabled = true

[probability]
default_speak_rate = 0.6
miss_speak_rate = 0.5
activity_trigger_rate = 0.6

[time_windows]
morning_start = "06:00"
morning_end = "09:00"
night_start = "22:00"
night_end = "23:59"
miss_trigger_hours = 6
silence_start = "00:00"
silence_end = "08:00"

[affection]
current_level = 0
